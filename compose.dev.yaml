services:
  console:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: console
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools

  phpcs:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: phpcs
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools

  phpmd:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: phpmd
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools

  phpstan:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: phpstan
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools

  phpunit:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: phpunit
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools

  coverage:
    build:
      context: .
      dockerfile: docker/tools/Dockerfile
      target: coverage
    volumes:
      - .:/var/www/html
    profiles:
      - dev
      - tools
