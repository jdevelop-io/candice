deptrac:
  paths:
    - src/Shared

  layers:
    - name: SharedDomainModel
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Shared\\Domain\\(Entity|ValueObject)\\#'
    - name: SharedDomainEvent
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Shared\\Domain\\Event\\#'
    - name: SharedInfrastructureSymfony
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Shared\\Infrastructure\\Symfony\\#'
    - name: SharedInfrastructureEvent
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Shared\\Infrastructure\\Event\\#'

  ruleset:
    SharedDomainEvent:
      - SharedDomainModel
    SharedInfrastructureEvent:
      - SharedDomainModel
      - SharedDomainEvent
    SharedInfrastructureSymfony:
      - DependencySymfony
