deptrac:
  paths:
    - src/Onboarding
    - tests/Unit/Onboarding

  layers:
    - name: OnboardingDomainModel
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Domain\\(Entity|ValueObject)\\#'
    - name: OnboardingDomainRepository
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Domain\\Repository\\#'
    - name: OnboardingDomainException
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Domain\\Exception\\#'
    - name: OnboardingDomainFactory
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Domain\\Factory\\#'
    - name: OnboardingDomainTests
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Tests\\Unit\\Onboarding\\Domain\\#'
    - name: OnboardingApplication
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Application\\#'
    - name: OnboardingApplicationTests
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Tests\\Unit\\Onboarding\\Application\\#'
    - name: OnboardingInfrastructureRepository
      collectors:
        - type: classNameRegex
          value: '#^%project_name%\\Onboarding\\Infrastructure\\Repository\\#'
    - name: OnboardingTests
      collectors:
        - type: bool
          must:
            - type: classNameRegex
              value: '#^%project_name%\\Tests\\Unit\\Onboarding\\#'
          must_not:
            - type: classNameRegex
              value: '#^%project_name%\\Tests\\Unit\\Onboarding\\(Domain|Application)\\#'

  ruleset:
    OnboardingDomainModel:
      - OnboardingDomainException
    OnboardingDomainRepository:
      - OnboardingDomainModel
    OnboardingDomainFactory:
      - OnboardingDomainModel
      - OnboardingDomainException
    OnboardingDomainTests:
      - OnboardingDomainFactory
      - OnboardingDomainModel
      - DependencyPHPUnit
    OnboardingApplication:
      - OnboardingDomainModel
      - OnboardingDomainFactory
      - OnboardingDomainRepository
      - OnboardingDomainException
    OnboardingApplicationTests:
      - OnboardingDomainFactory
      - OnboardingDomainException
      - OnboardingApplication
      - OnboardingInfrastructureRepository
      - OnboardingTests
      - DependencyPHPUnit
    OnboardingInfrastructureRepository:
      - OnboardingDomainModel
      - OnboardingDomainRepository
    OnboardingTests:
      - OnboardingDomainFactory
      - OnboardingApplication
      - OnboardingInfrastructureRepository
      - DependencyPHPUnit
